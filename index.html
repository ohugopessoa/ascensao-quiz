 "A frase: \"encontrar o verdadeiro propósito de vida, qual minha verdadeira missão nesta vida?\""
 ],
 mecanismo_neurológico_primario: "memoria_seletiva",
 sequestro_logica: "\"preciso me encontrar primeiro\", \"quando eu descobrir meu propósito aí sim.\" O sistema de defesa usa a busca por propósito como adiamento eterno, encontrar é o pretexto, não encontrar é a função.",
 depoimentos: [
 { texto: "Mistura de conhecimento com angústia de achar que estou perdido. Sei bastante, leio muito, acompanho os caminhos que os outros estão trilhando. Só o meu caminho não aparece.", autor: "Rafael, 29", contexto: "autônomo, São Paulo" },
 { texto: "Me sinto aprisionado a uma situação a qual já gostaria de ter superado. E o pior: não é uma situação externa. É uma identidade que decidi ser, e não sei como desdecidir.", autor: "Leonardo, 34", contexto: "analista em transição, Recife" },
 { texto: "Qual minha verdadeira missão nesta vida? A pergunta me acompanha desde os 22. Tentei responder com curso, com terapia, com viagem, com silêncio. Cada tentativa acertou em alguma coisa. Nenhuma respondeu o que eu realmente perguntei.", autor: "Amanda, 31", contexto: "buscadora, Porto Alegre" },
 ],
 },
 A12: {
 id: "A12",
 nome_m: "O Acumulador Teórico",
 nome_f: "A Acumuladora Teórica",
 eu_sou: "EU SOU quem sabe, ensina, mas não aplica em si.",
 niveis_dominantes: [2, 4],
 retrato: [
 "Tem enorme potencial. Sabe disso. Todo mundo sabe. Mas a prosperidade encontra alguma barreira que trava o progresso.",
 "Ensina para os outros o que não consegue aplicar em si. O paradoxo dói mais do que a paralisia.",
 "Consome transformação como se fosse alimento. Mas a fome nunca passa, porque o consumo virou substituto da ação.",
 "Não consigo aplicar o que sei, ensino para os outros mas não aplico em mim."
 ],
 mecanismo_neurológico_primario: "vies_confirmacao",
 sequestro_logica: "\"quando eu dominar isso, aí sim\", \"só mais um curso\", \"conhecimento é poder.\" O sistema de defesa disfarça a paralisia de acúmulo. Conhecimento sem ação é a droga preferida desse perfil.",
 depoimentos: [
 { texto: "Não consigo aplicar o que sei. Ensino pros outros mas não aplico em mim. Tenho biblioteca, anotações, plano. Só não tenho ação. E conhecimento sem ação virou minha especialidade.", autor: "Henrique, 44", contexto: "professor universitário, Florianópolis" },
 { texto: "Tenho enorme potencial, me disseram desde criança. Mas a prosperidade encontra alguma barreira que trava meu progresso antes de chegar. Não é falta de oportunidade. É algo interno que sempre dá um jeito de atrasar.", autor: "Viviane, 39", contexto: "mentora, Rio de Janeiro" },
 { texto: "Tenho muito conhecimento e não consigo resultados positivos reais. É como se entre o que eu sei e o que eu vivo existisse um vão. E cada novo curso que faço amplia o vão em vez de fechá-lo.", autor: "Ricardo, 47", contexto: "consultor, Belo Horizonte" },
 ],
 },
 A13: {
 id: "A13",
 nome_m: "O Imigrante Nostálgico",
 nome_f: "A Imigrante Nostálgica",
 eu_sou: "EU SOU alguém que não pertence a lugar nenhum.",
 niveis_dominantes: [4, 1, 2],
 retrato: [
 "Saiu do Brasil buscando algo melhor. Encontrou conforto material e vazio emocional.",
 "Vive entre dois mundos: no país onde está, não pertence de verdade. No Brasil que deixou, já não cabe.",
 "A saudade não é do lugar. É de quem era antes de sair.",
 "Medo, pois moro em outro país... tinha minha casa no Brasil, vendi para estar aqui."
 ],
 mecanismo_neurológico_primario: "memoria_seletiva",
 sequestro_logica: "\"quando eu voltar pro Brasil tudo vai fazer sentido\", \"aqui é temporário.\" A lógica vive no futuro do retorno, e o presente é um parêntese permanente.",
 depoimentos: [
 { texto: "Medo. Moro em outro país, tinha minha casa no Brasil, vendi pra estar aqui. E agora estou nem lá nem cá. A daqui não me reconhece, a de lá mudou enquanto eu estava fora. Não tem endereço pra quem eu virei.", autor: "Renata, 47", contexto: "brasileira em Portugal" },
 { texto: "Aos 62 anos, há 8 anos morando na Inglaterra, estou bem exausta. Voltar ao Brasil é meu ideal de vida. Mas quando viajo, não reconheço mais o que deixei. E volto mais confusa do que fui.", autor: "Sílvia, 62", contexto: "aposentada brasileira em Londres" },
 { texto: "A interferência não muda de país. Ela viaja junto. Mudei de cidade, mudei de continente, mudei de idioma. O código continuou exatamente onde estava, só o cenário em volta mudou.", autor: "Felipe, 38", contexto: "brasileiro nos EUA" },
 ],
 },
 A14: {
 id: "A14",
 nome_m: "O Viciado em Transformação",
 nome_f: "A Viciada em Transformação",
 eu_sou: "EU SOU alguém que busca sem parar, porqueparar é sentir.",
 niveis_dominantes: [2, 3, 4],
 retrato: [
 "Terapia, coaching, constelação, reiki, barras, ayahuasca, meditação, retiro. A lista é longa. O resultado é curto.",
 "Cada método funciona por uns dias. A leveza vem. Depois volta tudo. E a busca recomeça.",
 "A busca por transformação virou a transformação em si. O processo é a droga. Não o resultado.",
 "O sistema de defesa adora: parece que está mudando, sem mudar nada."
 ],
 mecanismo_neurológico_primario: "vies_confirmacao",
 sequestro_logica: "\"esse próximo método vai ser o que resolve\", \"estou num processo\", \"pelo menos estou buscando.\" A lógica transforma busca em mérito. Buscar sem resolver é o mecanismo mais elegante de regressão.",
 depoimentos: [
 { texto: "Na verdade não sei qual é meu bloqueio, já que tentei inúmeras técnicas. Terapia, constelação, reiki, barras, três cursos de autoconhecimento diferentes no último ano. Cada um funciona 2-3 semanas. Depois volta.", autor: "Carolina, 42", contexto: "terapeuta holística, Florianópolis" },
 { texto: "Sou espiritualista, amo tudo que é sobre a vida. Mas o estranho ainda é que eu me culpo em me cuidar. Passo conhecimento pros outros mas quando o assunto sou eu, algo trava. A casa do ferreiro, mas com mais vocabulário.", autor: "Juliano, 45", contexto: "facilitador, Salvador" },
 { texto: "Os métodos tocam a frequência por um instante. Mas sem reescrever a identidade que emite a frequência, ela volta ao ponto de origem. É tipo mover uma bússola com ímã, ela aponta pra onde você quer enquanto o ímã está lá. Some o ímã, ela volta pro norte.", autor: "Tatiana, 38", contexto: "buscadora, Rio de Janeiro" },
 ],
 },
 // ─── COMPOSIÇÕES ──────────────────────────────────────────────
 A15: {
 id: "A15",
 nome_m: "O Pai Solo Exausto",
 nome_f: "A Mãe Solo Exausta",
 eu_sou: "EU SOU quem segura tudo sozinho, e não aguenta mais.",
 niveis_dominantes: [2, 4, 3],
 retrato: [
 "Segura tudo nas costas. Filhos, casa, contas, emoções. Sem parceiro pra dividir. Sem rede.",
 "Cada dia é sobrevivência. Cada mês é uma conta que quase não fecha. E ninguém vê o peso.",
 "O cansaço não é do trabalho. É de uma identidade que não reconhece descanso como direito.",
 "A fragilidade financeira consome tudo."
 ],
 mecanismo_neurológico_primario: "efeito_nocebo",
 sequestro_logica: "\"não posso parar\", \"os filhos dependem de mim\", \"quem vai resolver se não for eu?\" A lógica transformou sobrecarga em identidade. Parar parece abandonar.",
 depoimentos: [
 { texto: "Sinto dificuldade em manter a minha casa, a casa da minha mãe e do meu irmão. A renda entra e já tem nome em cima, três pessoas dependem de mim. Sobra culpa se eu gastar algo em mim.", autor: "Adriana, 39", contexto: "mãe solo, 2 filhos, Belo Horizonte" },
 { texto: "A fragilidade financeira é diária. Não é que falta, é que toda vez que junta algo, uma conta surge na véspera. Parece azar. Sei que não é.", autor: "Fabiana, 43", contexto: "mãe solo, Curitiba" },
 { texto: "Quando a interferência foi removida, descobri que pedir ajuda não era fraqueza. Era o primeiro passo pra sair do ciclo. Eu segurava sozinha porque aprendi que ninguém ia segurar por mim, e isso também era código, não realidade.", autor: "Mônica, 46", contexto: "mãe solo, Rio de Janeiro" },
 ],
 },
 A16: {
 id: "A16",
 nome_m: "O Marido Invisível",
 nome_f: "A Esposa Invisível",
 eu_sou: "EU SOU alguém que está presente mas não é visto.",
 niveis_dominantes: [1, 2],
 retrato: [
 "Está no casamento. Mas o casamento não está nele.",
 "Funciona. Resolve. Provê. E por dentro, um vazio que ninguém pergunta.",
 "Não sabe se ama ou se tem medo de ficar sozinho. A identidade colou no papel, e semo papel, não sabe quem é.",
 "Dificuldade de continuar no relacionamento depois da mentira."
 ],
 mecanismo_neurológico_primario: "efeito_nocebo",
 sequestro_logica: "\"pelo menos tenho companhia\", \"é melhor do que ficar sozinho\", \"ninguém é perfeito.\" A lógica normalizou a invisibilidade. A identidade prefere a dor conhecida ao desconhecido.",
 depoimentos: [
 { texto: "O casamento não acabou. Mas algo dentro dele morreu faz tempo. Dividimos a casa, a cama, as contas. Não dividimos a vida. E os filhos estão crescendo vendo isso como modelo de amor.", autor: "Rogério, 44", contexto: "pai de 2, casado há 18 anos, Rio de Janeiro" },
 { texto: "Atritos por falta de conexão. A gente briga por coisa boba porque não consegue conversar sobre o que importa. E o que importa fica guardado até virar distância.", autor: "Vanessa, 41", contexto: "casada há 15 anos, Recife" },
 { texto: "Quando a interferência relacional foi removida, redescobri a pessoa do meu lado. E descobri que ela também tinha desistido em silêncio. Ninguém tinha saído, mas os dois já não estavam lá.", autor: "Thiago, 47", contexto: "casado, 3 filhos, interior de SP" },
 ],
 },
 A17: {
 id: "A17",
 nome_m: "O Criativo Bloqueado",
 nome_f: "A Criativa Bloqueada",
 eu_sou: "EU SOU alguém que nasceu pra criar, e a identidade não reconhece isso como válido.",
 niveis_dominantes: [3, 2],
 retrato: [
 "Tem um dom. Uma vocação. Um chamado. E algo entre o chamado e a ação vira muro.",
 "A arte, o propósito, a criação, tudo fica no campo da ideia. Na hora de materializar, o corpo trava.",
 "A interferência religiosa transformou talento em vaidade. A sistêmica transformou arte em irresponsabilidade.",
 "Materializar um trabalho com propósito."
 ],
 mecanismo_neurológico_primario: "distorcao_autoeficacia",
 sequestro_logica: "\"arte não paga as contas\", \"preciso ser realista\", \"vou fazer isso quando tiver estabilidade.\" A lógica matou o chamado, e chama isso de maturidade.",
 depoimentos: [
 { texto: "Gostava de artes marciais, tinha dom pra pintura. Minha vida foi transformada por um acidente, perdi a visão parcial. Mas o dom continuava lá, esperando. Não foi o acidente que me parou: foi o que eu acreditava sobre o que eu podia merecer.", autor: "Bruno, 42", contexto: "artista visual, Salvador" },
 { texto: "Materializar um trabalho com propósito. Tenho talento, tenho ideia, tenho técnica. A entrega é que trava. Meu portfólio tem 10 projetos começados e 1 terminado, e foi por encomenda, não por escolha minha.", autor: "Clara, 35", contexto: "designer e escritora, Rio de Janeiro" },
 { texto: "Quando a interferência religiosa foi removida, percebi que o dom não era vaidade. Era a semente. Eu tinha aprendido que brilhar era pecado. Quando parei de esconder, o que os outros sempre viram começou a ser visível pra mim também.", autor: "Débora, 39", contexto: "música, Curitiba" },
 ],
 },
 A18: {
 id: "A18",
 nome_m: "O Profissional em Ponto de Virada",
 nome_f: "A Profissional em Ponto de Virada",
 eu_sou: "EU SOU alguém que funciona no automático, e parou de sentir.",
 niveis_dominantes: [4, 2],
 retrato: [
 "Vai trabalhar. Faz o que precisa. Volta pra casa. Repete. Sem energia pra mais.",
 "A ambição desligou. O motor parou. Não é preguiça. É umsistema nervoso que desativou.",
 "Depois de tanto tentar sem resultado na proporção certa, o corpo desligou. Os dias parecem iguais.",
 "Não sente vontade de crescer. 'Tanto faz.'"
 ],
 mecanismo_neurológico_primario: "efeito_nocebo",
 sequestro_logica: "\"pelo menos eu tenho emprego\", \"tá bom do jeito que tá\", \"quem sou eu pra reclamar.\" A lógica transformou anestesia em gratidão. Conformismo virou virtude.",
 depoimentos: [
 { texto: "Procrastinação, insegurança, problemas familiares e conjugais. Tudo ao mesmo tempo, todo dia. Já não sei o que é cansaço do trabalho e o que é cansaço de existir.", autor: "Maurício, 48", contexto: "CLT há 20 anos, gerência média, São Paulo" },
 { texto: "Os dias passam e parecem iguais. Não estão ruins. Mas não estão bons. Estão cinza. Acordo, trabalho, volto, durmo. E repito. Sem saber quando foi que isso virou o que eu chamo de vida.", autor: "Rodolfo, 52", contexto: "profissional em ponto de virada, Belo Horizonte" },
 { texto: "Quando a interferência sistêmica foi removida, a energia voltou. Não de fora, de dentro. O motor religou. Eu achei que precisava mudar de emprego. Na verdade precisava acessar por que eu tinha desligado o meu de dentro.", autor: "Roberta, 46", contexto: "ex-CLT, em transição, Porto Alegre" },
 ],
 },
 // ─── NOVOS (v13, derivados dos clusters reais dos CSVs) ────────
 A19: {
 id: "A19",
 nome_m: "O Empreendedor com Teto Espiritual",
 nome_f: "A Empreendedora com Teto Espiritual",
 eu_sou: "EU SOU alguém que pede prosperidade e se pune por pedir.",
 niveis_dominantes: [3, 2, 4],
 retrato: [
 "Sabe construir. Sabe vender. Sabe entregar. E o dinheiro entra e sai sem ficar.",
 "Comprou mais de um curso com a expectativa de 'dessa vez vai'. Dessa vez também voltou ao mesmo lugar.",
 "Reza pedindo. Recebe. Sente uma culpa miúda que não sabe explicar. Completa a oração com 'se for da Sua vontade'. O 'se' é a válvula.",
 "Quando o faturamento se aproxima de um próximo patamar, alguma coisa no corpo aperta. Uma conta aparece. Um cliente some. Uma decisão compromete. Atribui ao acaso. Não é.",
 "Carrega a frase 'quem quer muito perde tudo' sem lembrar quem disse. Sabe que é código. Não sabe como tirar.",
 ],
 mecanismo_neurológico_primario: "vies_confirmacao",
 sequestro_logica: "'É vontade de Deus', 'se fosse pra eu ter, teria', 'não é o momento'. A lógica espiritual virou o disfarce da escassez instalada. Questionar parece falta de fé. Parece, mas não é.",
 depoimentos: [
 { texto: "Minha vida financeira travada. Já comprei vários cursos, aí penso 'agora vai', e depois volta tudo de novo. A interferência religiosa não desliga com teologia nova. Ela mora numa camada anterior.", autor: "Patricia, 45", contexto: "empreendedora evangélica, Goiânia" },
 { texto: "Apesar de ter conquistado muito, vivo com uma mentalidade de escassez. Minha boca pede, meu coração nega. Rezo pedindo abundância e na hora que ela chega, uma voz interna pergunta 'será que posso?'", autor: "Simone, 48", contexto: "empresária, evangélica, interior de SP" },
 { texto: "Cresci ouvindo que 'rico não entra no Reino'. Fui à igreja por 30 anos. Saí. A frase ficou. Hoje minha fé é mais ampla e a culpa do dinheiro continua operando como se fosse de Deus, mas é código da infância disfarçado de fé.", autor: "Érica, 52", contexto: "empresária em transição de fé, Curitiba" },
 ],
 },
 A20: {
 id: "A20",
 nome_m: "O Curador Ferido",
 nome_f: "A Curadora Ferida",
 eu_sou: "EU SOU de todos. De mim, quase nada.",
 niveis_dominantes: [3, 2],
 retrato: [
 "Cuida, cura, ensina, atende. É a pessoa pra quem os outros ligam quando não sabem mais pra quem ligar.",
 "Os clientes saem melhor do que chegaram. Você continua exatamente onde estava. Financeira e emocionalmente.",
 "Cobra menos do que vale. Tenta cobrar mais. Na hora, dá desconto. 'A pessoa precisa.' A única que não recebe o que precisa é você.",
 "Ensina pros outros o remédio que você mesma não consegue tomar. O paradoxo dói mais que o cansaço.",
 "A frase que mais volta: 'me perdi do que para mim era essência'.",
 ],
 mecanismo_neurológico_primario: "memoria_seletiva",
 sequestro_logica: "'É minha missão', 'Deus me chamou pra servir', 'primeiro os outros'. A vocação virou escudo. Anular-se virou virtude. Cobrar parece traição à missão.",
 depoimentos: [
 { texto: "Passei a vida ajudando pessoas e esqueci de mim. Agora olho pro espelho e não reconheço. Sou ótima pra orientar, péssima pra receber. Cobro pouco, dou demais, sobro pouco.", autor: "Luciana, 47", contexto: "terapeuta holística, Rio de Janeiro" },
 { texto: "Sou terapeuta há 7 anos. Me pego com síndrome da impostora toda semana. Ensino sobre abundância e não consigo cobrar direito. Os clientes prosperam. Eu continuo apertada, e culpada de achar que isso é errado.", autor: "Marcela, 41", contexto: "terapeuta transpessoal, Florianópolis" },
 { texto: "Faço curso, me especializo, e os clientes não vêm com abundância. É como se minha frequência não aceitasse o que minha mente quer oferecer. A técnica cresce. O recebimento, não.", autor: "Gabriela, 44", contexto: "facilitadora, Belo Horizonte" },
 ],
 },
 A21: {
 id: "A21",
 nome_m: "O Viúvo em Reorganização",
 nome_f: "A Viúva em Reorganização",
 eu_sou: "EU SOU alguém que continua quando já não sabe pra quê.",
 niveis_dominantes: [1, 2, 4],
 retrato: [
 "Algumas manhãs você acorda e leva alguns segundos pra lembrar que ele (ou ela) não está mais lá. Esse intervalo é a última forma que a presença encontrou de ficar.",
 "A casa continua. As contas continuam. Você continua. Por dentro, algo parou de continuar junto.",
 "Os filhos seguiram a vida. É certo que sigam. Mas a ausência ficou. E a ausência tem quarto, horário, cadeira à mesa.",
 "A rotina virou contorno. Você se move dentro dela sem saber se ainda habita.",
 "Uma parte de você quer companhia nova. Outra sente que querer é traição.",
 ],
 mecanismo_neurológico_primario: "efeito_nocebo",
 sequestro_logica: "'Já não tem mais idade', 'meu tempo já passou', 'não dá mais pra começar'. A idade virou sentença. A perda virou identidade. Continuar parece teimosia; recomeçar parece impossível.",
 depoimentos: [
 { texto: "Meu marido morreu vítima da COVID. Um baque. Hoje estou sozinha desde os 52 e desejo ardentemente um novo companheiro, mas me sinto culpada por querer. Como se querer traísse o que vivi com ele por 28 anos.", autor: "Regina, 54", contexto: "viúva, Rio de Janeiro" },
 { texto: "Perdi minha irmã, depois perdi minha mãe. Fiquei eu e Deus. Sinto que a vida me pediu pra recomeçar num momento que eu só queria descansar. Tenho 58 e não sei mais quem sou sem as pessoas em torno das quais eu me defini.", autor: "Cecília, 58", contexto: "viúva, em reconstrução, Fortaleza" },
 { texto: "As minhas filhas casaram, vivem a vida delas, não tem tempo pra mim. Não julgo. Só sinto. Passei décadas sendo a mãe delas, e agora que esse papel se aquietou, percebo que esqueci de construir o resto.", autor: "Dulce, 61", contexto: "aposentada, Salvador" },
 ],
 },
 A22: {
 id: "A22",
 nome_m: "O Sobrevivente de Relação Narcisista",
 nome_f: "A Sobrevivente de Relação Narcisista",
 eu_sou: "EU SOU alguém que ainda duvida da própria percepção.",
 niveis_dominantes: [1, 2],
 retrato: [
 "Saiu. Ou está saindo. Ou já saiu com o corpo e ainda não saiu com a cabeça.",
 "Ainda se pergunta o que fez de errado pra pessoa ser assim. A resposta é: nada. Mas a pergunta continua.",
 "Tem momentos em que duvida da própria memória. 'Foi assim mesmo? Será que eu não exagerei?' É a voz dela (ou dele) falando com o seu sotaque.",
 "Saiu com medo. Fora, descobriu que o medo continua mesmo sem a fonte. O problema nunca foi só a pessoa. Foi o código que aceitou a pessoa.",
 "Tem que reconstruir a noção do que é normal. E isso leva tempo que ninguém mede.",
 ],
 mecanismo_neurológico_primario: "distorcao_autoeficacia",
 sequestro_logica: "'Será que era mesmo pra tanto?', 'talvez eu tenha exagerado', 'ele (ela) também sofreu'. A dúvida foi instalada pela pessoa e continua operando sem ela. O sistema de defesa aprendeu a olhar pra dentro como ameaça.",
 depoimentos: [
 { texto: "Consegui me divorciar de um casamento de 22 anos com um narcisista. Só depois entendi que o problema não era só ele. O código que me fez aceitar aquilo começou antes dele, ele só encontrou uma estrutura que já aceitava.", autor: "Sandra, 46", contexto: "divorciada, em reconstrução, São Paulo" },
 { texto: "Passei por relacionamentos abusivos. Sinto culpa até hoje de ter ficado tanto tempo. Hoje sei que não era fraqueza, era código gravado antes das palavras. O sistema nervoso reconhecia aquilo como familiar. E familiar, pro corpo, vale como seguro.", autor: "Carla, 42", contexto: "sobrevivente, terapeuta em formação, Belo Horizonte" },
 { texto: "Às vezes o fantasma do passado assola o meu casamento atual. É a voz dele ainda decidindo por mim, mesmo anos depois. Quando duvido da minha percepção, não é o meu marido de hoje, é o treinamento que aprendi com o de ontem.", autor: "Isabel, 39", contexto: "recasada após divórcio, Porto Alegre" },
 ],
 },
 A23: {
 id: "A23",
 nome_m: "O Desperto Resistente",
 nome_f: "A Desperta Resistente",
 eu_sou: "EU SOU quem sabe tanto que parou de ouvir.",
 niveis_dominantes: [2, 4],
 retrato: [
 "Você tem o mapa. Conhece os autores. Já consumiu Joe Dispenza, Hélio Couto, Gregg Braden, Paulo Vieira. Já fez constelação, reiki, barras, ayahuasca.",
 "Você domina o vocabulário. 'Frequência', 'colapso de onda', 'campo', 'cocriar'. Explica pros outros. Eles ficam impressionados.",
 "E por dentro, uma coisa: o resultado não tá proporcional ao volume de conhecimento. Isso te incomoda e você não fala disso pra ninguém.",
 "O sistema de defesa encontrou um disfarce genial: o conhecimento. Quanto mais você sabe, mais o porteiro interno aceita que você ESTUDE enquanto te impede de FAZER.",
 "Parar de estudar parece retrocesso. Continuar estudando parece prudência. Nenhum dos dois está certo.",
 ],
 mecanismo_neurológico_primario: "vies_confirmacao",
 sequestro_logica: "'Eu já sei disso', 'esse cara é básico', 'eu já passei dessa fase', 'meu nível é outro'. O sistema de defesa usa a sua inteligência contra você. Saber virou o novo escudo.",
 depoimentos: [
 { texto: "Estudo hermetismo, gnose, física quântica. Já tive vislumbres do samadhi. Mas no dia a dia, continuo travando nas mesmas coisas de 10 anos atrás. A consciência chega em flashes. A vida continua no mesmo endereço.", autor: "Murilo, 43", contexto: "buscador avançado, facilitador, Florianópolis" },

function montarPredicoes(perfilId, demo, answers, padrao) {
 const base = PREDICOES_PERFIL[perfilId] || [];
 const cruz = PREDICOES_CRUZADAS[perfilId] || {};
 const add = [];

 if (cruz.ocupacao && cruz.ocupacao[demo.ocup]) add.push(...cruz.ocupacao[demo.ocup]);
 if (cruz.familia && cruz.familia[demo.familia]) add.push(...cruz.familia[demo.familia]);
 if (cruz.idade_jovem && demo.registro_etario === "jovem") add.push(...cruz.idade_jovem);
 if (cruz.idade_adulto && demo.registro_etario === "adulto") add.push(...cruz.idade_adulto);
 if (cruz.idade_maduro && demo.registro_etario === "maduro") add.push(...cruz.idade_maduro);
 if (cruz.financeiro_baixo && demo.financeiro === "baixo") add.push(...cruz.financeiro_baixo);
 if (cruz.financeiro_alto && demo.financeiro === "alto") add.push(...cruz.financeiro_alto);
 if (cruz.religioso && demo.espiritual === "religioso") add.push(...cruz.religioso);
 if (cruz.genero_f && demo.gen === "F") add.push(...cruz.genero_f);
 if (cruz.genero_m && demo.gen === "M") add.push(...cruz.genero_m);
 if (cruz.religiao_especifica) {
 const rel = answers.Q_RELIGIAO;
 if (rel && cruz.religiao_especifica[rel]) add.push(...cruz.religiao_especifica[rel]);
 }

 // v26, G7: predições universais do padrão (2 das 3, pra não explodir lista)
 if (padrao && PREDICOES_PADRAO[padrao]) {
 add.push(...PREDICOES_PADRAO[padrao].slice(0, 2));
 }

 // Concatena base + cruzadas, limita em 12 pra não fatigar o leitor
 return [...base...add].slice(0, 12);
}

 prof_cura: "Se você cuida de outros profissionalmente, carrega duas identidades: a mulher que serve (o que a religião elogia) e a empreendedora que cobra (o que a religião suspeita). Essas duas se contradizem. E você tenta equilibrar, com você saindo no prejuízo.",
 luto_ancestral: "A perda recente tocou um ponto fundo: sua linhagem é de mulheres que prosperaram e pagaram caro, ou de mulheres que não prosperaram e se consolaram com fé. O luto puxa essa memória junto, e você processa sozinha num idioma que ainda não tem.",
 soma: {
 A: "O aperto no peito antes de fechar uma venda, de cobrar o que vale, de aceitar um novo patamar. Não é nervoso comercial. É o código dizendo 'isso te afasta'. Afasta de Deus, da família, da mulher virtuosa que você deveria ser.",
 B: "O peso nos ombros é herança. Você carrega a família, o marido (ou a ausência), os filhos, a empresa, a mãe, a comunidade. Cada um é um peso aceito como 'dever'. E soltar parece falta de fé.",
 C: "O nó no estômago quando calcula quanto cobrar. Não é sobre o cliente, é sobre merecer. A voz que te pergunta 'quem você pensa que é?' foi instalada por quem te amava. É difícil ver que foi código.",
 D: "O cansaço súbito chega depois de um dia bom de faturamento. Você atribui à rotina. Não é. É o sistema dizendo 'isso é demais' e cortando a energia antes que você queira mais amanhã.",
 E: "Vazio + culpa juntos. Assinatura pura. Você ganhou, e não consegue celebrar. A voz diz 'tem gente precisando'. Doa, ajuda, reparte, e ainda sobra uma dívida interna que só se quita diminuindo você mesma.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Essa diferença é onde a fé e o código se separam. O que você diz querer em voz alta tem que passar pelo filtro da mulher-de-Deus. O que mudaria se liberasse é o que a voz em você nem deixa você nomear.",
 renda_alta_vazio: "Faturamento cresceu. Satisfação não. Isso porque a conta mental que você carrega é espiritual, não financeira. 'Dinheiro sem propósito é vaidade', ouviu tantas vezes. E agora toda abundância vem com cobrança interna.",
 p_meta_ativo: "Já apareceu um pensamento: 'Deus me trouxe até aqui, será que isso é presunção?'. Esse pensamento não é fé, é código usando a linguagem de Deus pra te manter no lugar. Deus não fala pela boca do medo.",
 p9_cronico: "Você já fez cursos, coaching, mentorias. Alguns com conteúdo espiritual, outros com pé mais empresarial. Todos te tiraram do lugar por um tempo, e todos deixaram o código intacto. Porque o código é religioso, e nenhum deles toca essa camada com precisão.",
 },

 A20: { // Curadora Ferida
 prof_cura: "Essa é a sua identidade central. Você ajuda, cuida, cura os outros. E cobra baixo, atende depois do expediente, dá desconto pra amigo. Os clientes saem melhor do que chegaram. Você continua no mesmo lugar.",
 luto_ancestral: "A perda recente é atravessada com as ferramentas que você aplica nos outros. Com eles funciona. Com você, não. Isso revela que a sua dor mora num lugar que o conjunto de ferramentas que te define profissionalmente ainda não alcançou.",
 soma: {
 A: "O aperto no peito antes de enviar uma cobrança. Antes de aceitar um cliente em horário nobre. Antes de dizer 'não'. O aperto é o código dizendo 'você não é esse tipo de pessoa'. E você obedece.",
 B: "O peso nos ombros virou rotina. A agenda lotada, as demandas emocionais dos pacientes, os atendimentos que se estendem. O peso virou credencial. Sem ele, a identidade de curadora não se sustenta.",
 C: "O nó no estômago quando alguém sugere 'você deveria cobrar mais'. Não é inseguros quanto ao valor. É que cobrar mais contradiz a história interna que diz 'sou diferente, sou vocação'. Vocação virou armadilha.",
 D: "O cansaço vem junto com um pensamento: 'será que não é pra mim'. Você atribui a um momento ruim. Não é. É o sistema sabotando a continuidade porque o modelo atual tá levando você à exaustão.",
 E: "A culpa quando você pensa em cobrar o que vale. Você se culpa como se fosse ganância. Não é ganância. É reparação histórica pelos atendimentos que você já ofereceu abaixo do ponto justo.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Diferença reveladora: você ainda projeta o que quer dentro do formato 'servir'. A mudança real precisa ser em você, a que ainda não aprendeu a existir sem o outro.",
 renda_alta_vazio: "Quando consegue cobrar mais, chega um desconforto: 'será que foi ético?'. Esse desconforto é código, não é ética. Ética não pune quem cobra justo. Código religioso-vocacional pune.",
 p_meta_ativo: "Uma parte sua já pensou, lendo isso: 'como eu uso isso pra ajudar meus clientes?'. Mesmo agora, no seu diagnóstico, você tá em modo-serviço. Esse automatismo é a identidade operando.",
 p9_cronico: "Você fez formações, terapias, cursos. Aprendeu a cuidar dos outros com precisão. A sua saúde emocional, financeira, relacional segue sem avanço proporcional. Isso não é falta de conhecimento, é um sistema que recusa aplicar em você o que aplica nos outros.",
 },

 A21: { // Viúva Reorganizando
 prof_cura: "Se trabalha cuidando, o luto deu nova dimensão à vocação. Você entende o outro de um jeito que antes não alcançava. E ao mesmo tempo, atender vira forma de não ficar consigo. A profissão virou, também, fuga.",
 luto_ancestral: "A perda recente tocou uma rede antiga. Mulheres e homens da sua linhagem também enterraram cedo, reorganizaram identidade depois dos 50, começaram de novo sem manual. Você tá cumprindo um capítulo que já foi escrito várias vezes, só que, agora, com você.",
 soma: {
 A: "O aperto no peito aparece em momentos específicos: domingo à tarde, feriado, aniversário. Não é memória pontual, é o corpo lembrando da presença que não vem. Aperto como ausência.",
 B: "O peso nos ombros é diferente agora. Não é da rotina, é de segurar a casa, as contas, as decisões antes compartilhadas. Você virou frente dupla. E ninguém viu a transição.",
 C: "O nó no estômago vem quando alguém pergunta 'e agora?'. A pergunta é bem-intencionada. A resposta não existe ainda. E o nó é o reconhecimento de que você está num começo sem saber que é começo.",
 D: "O cansaço é o mais longo de todos. Não é do corpo, é de acordar todos os dias reconstruindo o mundo. Cada manhã é reelaboração, e reelaboração cansa mais do que rotina.",
 E: "A culpa quando ri, quando se diverte, quando pensa em conhecer alguém novo. Código: 'como ousa?'. Não é dedicação à memória. É trava pra você não seguir antes da sua dor.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Responder essas duas agora, nesse momento da vida, é ato de reconstrução. Ambas as respostas são janelas pra quem você tá se tornando sem ainda saber.",
 renda_alta_vazio: "Pode estar financeiramente estável. A pensão, a herança, a carreira sustentam. E mesmo assim existe um buraco que dinheiro não preenche, porque não é material. É identitário.",
 p_meta_ativo: "Leu até aqui com uma voz dizendo 'na minha idade?'. Essa voz é o código. Idade virou argumento pra não recomeçar. Nenhuma idade autoriza nem proíbe identidade nova. O que autoriza é a decisão de fazer.",
 p9_cronico: "Você buscou ajuda, talvez grupo de apoio, terapia. Foi útil. Foi pouco. Porque o que você precisa agora não é processar o que foi. É imaginar quem é agora. E essa imaginação não tem método pronto, precisa de espaço protegido pra nascer.",
 },

 A05: { // Casamento Desistiu
 prof_cura: "Se você cuida profissionalmente, é treinado pra enxergar dor no outro. Chega em casa e ignora a distância que mora ali. Sua casa virou o laboratório do avesso do seu trabalho.",
 luto_ancestral: "Sua linhagem tem mulheres e homens que aguentaram casamento por dever. A perda recente reativou essa marca, a de permanecer mesmo quando a coisa já acabou por dentro.",
 soma: {
 A: "O aperto no peito quando pensa em conversar aquilo que vocês não conversam chega antes da fala. Você já estava sentindo antes de abrir a boca. Por isso não abre.",
 B: "O peso nos ombros é cumulativo. Cada ano que passou sem vocês se verem de verdade se somou. O peso não é do trabalho, é dos silêncios que você escolheu.",
 C: "O nó no estômago chega quando alguém elogia o seu casamento. Você sorri, agradece, muda de assunto. O nó sabe da distância que o elogio não vê.",
 D: "O cansaço súbito aparece depois de eventos sociais em que vocês 'representaram'. Não é do evento. É do esforço de performar união que não tá mais ali.",
 E: "O vazio depois do jantar a dois sem assunto é específico. Não é tédio. É a presença da ausência sentada na cadeira da frente.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. A distância entre as duas é o espaço que o casamento ocupa na sua identidade, e a dificuldade de admitir que o espaço vazou.",
 renda_alta_vazio: "Vocês construíram patrimônio juntos. Casa, viagens, reserva. Patrimônio comum não virou vida comum. Construir junto não é o mesmo que estar junto.",
 p_meta_ativo: "Uma voz disse agora: 'é normal casal ficar assim depois de anos'. Essa voz é o código. Ela normaliza o que você não quer que seja normal.",
 p9_cronico: "Terapia de casal, terapia individual, talvez retiro. Cada um tocou o assunto sem chegar na raiz. Porque a raiz é a identidade que aceitou viver em automático, e nenhum método tocou isso diretamente.",
 },

 A08: { // Potencial Contido
 prof_cura: "Se você já começou a cuidar profissionalmente, tá cedo e sente 'todo mundo entende mais que eu'. Não é verdade no trabalho. É verdade no código interno que diz 'você não é desse jeito ainda'.",
 luto_ancestral: "A sua linhagem tem um padrão de gente parada vendo os outros passarem. Você herdou a vista. Falta te autorizar a sair do banco da reserva.",
 soma: {
 A: "O aperto no peito antes de começar qualquer coisa nova. Não é medo do resultado. É medo de sair do lugar de 'quem tem potencial' pro lugar de 'quem tá fazendo', porque 'fazer' expõe.",
 B: "O peso nos ombros é do não-começo. Você carrega a soma de todas as versões de si mesmo que não aconteceram ainda.",
 C: "O nó no estômago quando alguém pergunta 'quando vai acontecer?'. A resposta não existe. O nó é o silêncio que preenche o vazio entre a pergunta e a resposta.",
 D: "O cansaço sem motivo é comum. Você não fez quase nada, e tá exausto. Isso não é preguiça, é o sistema consumindo energia em conter o desejo de começar.",
 E: "O vazio depois de scrollar a carreira de alguém da sua idade é familiar. Cada conquista alheia vira espelho distorcido. Você se culpa por sentir. A culpa é o código.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. A primeira é o sonho que você se autoriza. A segunda é a identidade que ainda não começou a ser construída, é ali que mora o bloqueio.",
 renda_alta_vazio: "Se já tem salário bom cedo, sente que é 'provisório', que 'vão descobrir'. A síndrome do impostor aqui não é insegurança profissional. É o código dizendo que você não deveria estar nesse patamar ainda.",
 p_meta_ativo: "Uma voz disse agora: 'eu não seria capaz disso'. Essa voz chegou antes de você tentar. Ela é o teto, antes da experiência.",
 p9_cronico: "Curso de empreendedorismo, mentoria de carreira, livros de produtividade. Nenhum deles ultrapassou a barreira da execução. Porque a barreira é identitária, não informacional.",
 },

 A09: { // Aposentado Perdido
 prof_cura: "Se você cuidou de outros a vida toda, enfermagem, ensino, liderança, a aposentadoria tirou o papel. Sem papel, a identidade ficou sem moldura.",
 luto_ancestral: "A sua linhagem tem gente que trabalhou muito e morreu logo depois de aposentar. Seu corpo sabe dessa conta. A inquietação atual não é só sua, é genealógica.",
 soma: {
 A: "O aperto no peito ao acordar sem compromisso específico é novo. Antes era alívio imaginado. Agora é desconforto real. Ninguém te avisou que o tempo livre ia pesar.",
 B: "O peso nos ombros mudou de conteúdo. Antes era responsabilidade. Agora é a falta dela. Duas formas do mesmo peso.",
 C: "O nó no estômago quando alguém pergunta 'e agora, o que você tá fazendo?'. A resposta te constrange. Você não tem uma. E não tinha se preparado pra não ter.",
 D: "O cansaço sem ter feito nada é novo. O corpo não se encontra no novo ritmo. Ele aprendeu a gastar energia em função, sem função, ele não sabe descansar.",
 E: "O vazio com culpa aparece ao descansar. 'Eu deveria estar fazendo algo'. Essa voz veio junto com o crachá que você não tem mais. Ninguém te ensinou a desligar.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Responder essas duas aos 60, 65, 70 é ato de reabertura. A identidade pós-aposentadoria não veio pronta.",
 renda_alta_vazio: "A reserva chegou. A paz não chegou junto. Porque o que travou não era falta de dinheiro, era a identidade que se apegou ao trabalho como razão de existir.",
 p_meta_ativo: "Uma voz disse 'pra que mudar agora?'. Essa voz é o código da aposentadoria como fim, não como fase. Ela te mantém sentado.",
 p9_cronico: "Livros de reinvenção, cursos de longevidade, hobbies testados. Cada um ocupou o tempo por um período. Nenhum ocupou o lugar onde a identidade precisa ser reconstruída.",
 },

 A11: { // Sem Rumo
 prof_cura: "Se trabalha com cuidado, ajuda o outro a encontrar direção enquanto a sua bússola tá parada. Funciona pros clientes. Em você, a ferramenta não cria tração.",
 luto_ancestral: "A perda recente encontrou você já sem bússola clara. Sua linhagem também tem momentos de dispersão, você tá numa dessas fases geracionais.",
 soma: {
 A: "O aperto no peito quando alguém pergunta 'o que você quer?'. Você não sabe. O aperto aparece antes da resposta, substitui a resposta.",
 B: "O peso nos ombros é da indecisão crônica. Cada dia sem direção definida adiciona mais um tijolo. Não é burnout, é estagnação com consciência dela.",
 C: "O nó no estômago quando tenta planejar o próximo ano. As opções giram. Nenhuma ancora. O nó é o corpo desistindo antes da cabeça escolher.",
 D: "O cansaço de não saber é cansaço real. Manter possibilidades abertas consome energia constante.",
 E: "O vazio com vontade de ter vontade é específico do seu caso. Você não tá depressivo, você tá desconectado. São coisas diferentes.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Responder já é um passo raro no seu perfil. A dificuldade de responder é a assinatura.",
 renda_alta_vazio: "Se tem renda boa, ainda sente 'mas pra quê?'. O dinheiro não resolveu a ausência de mapa. Ele só te deu mais opções dentro do mesmo silêncio interno.",
 p_meta_ativo: "Uma voz disse agora 'nada vai funcionar mesmo'. Essa voz é a trava. Ela se instalou e virou filtro de toda possibilidade nova.",
 p9_cronico: "Muitas tentativas, em muitas direções. Nenhuma cristalizou. Porque o problema não é método, é a identidade que não se decidiu por ser quem ela é.",
 },

 A12: { // Acumulador Teórico
 prof_cura: "Essa é praticamente a sua identidade nuclear. Você ensina, prescreve, aplica nos outros. Em você, o mesmo remédio não passa pela boca.",
 luto_ancestral: "A perda recente tá sendo processada com framework em vez de atravessada. Sua linhagem também tem gente que entende sem sentir. Herdou a defesa.",
 soma: {
 A: "O aperto no peito antes de aplicar em si o que sabe. Ensinar é seguro. Aplicar expõe. O aperto é o corpo protegendo contra a exposição que saber cria.",
 B: "O peso nos ombros é o da biblioteca mental de conteúdo não aplicado. Cada capítulo sabido mas não vivido se soma. Virou carga invisível.",
 C: "O nó no estômago quando alguém pergunta 'você aplica isso em você?'. A resposta honesta trava na garganta. O nó engole a verdade.",
 D: "O cansaço pós-consumo de conteúdo é típico. Leu, entendeu, se esgotou como se tivesse feito. Não fez. O corpo entende que terminou, mesmo que a ação não tenha começado.",
 E: "O vazio depois de ensinar algo que funcionou pro outro. 'Eu sei tanto, por que não vivo?'. A culpa chega junto, e vira motor pro próximo estudo.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. Você sabe os dois. Sabe de cor. O saber virou o escudo contra o fazer.",
 renda_alta_vazio: "Curso caro, formação top, mentoria premium. Tudo feito. O resultado interno segue intacto. Porque o acúmulo não é o caminho, é o desvio.",
 p_meta_ativo: "Uma voz disse 'já sabia de tudo isso'. Essa voz é o próprio código se protegendo. Se 'já sabe', não precisa atravessar.",
 p9_cronico: "Muitos métodos, muito conhecimento. E ainda aqui. Isso não aponta falha dos métodos: aponta que o sistema aprendeu a absorver informação sem permitir mudança.",
 },

 A13: { // Imigrante Nostálgico
 prof_cura: "Se cuida em outro país, a missão vira sobrevivência misturada. Você atende a comunidade que deixou a sua. Não tem separação nítida entre ajudar e compensar.",
 luto_ancestral: "Migrar é um luto sem enterro. Sua linhagem pode ter migrado antes, interna ou externamente. Você tá dentro de uma cadeia de deslocamentos.",
 soma: {
 A: "O aperto no peito ao ouvir sotaque de casa, canção familiar, palavra que não é traduzível. Chega de surpresa. O corpo reconhece antes da cabeça.",
 B: "O peso nos ombros é de construir tudo de novo, identidade, rede, documentos, legitimidade. Cada centímetro conquistado fora custou caro.",
 C: "O nó no estômago quando alguém de casa pergunta 'mas lá tá bom mesmo?'. A verdade é complicada demais pra caber na resposta.",
 D: "O cansaço de viver em dois idiomas, dois fusos, duas identidades. Não é físico. É o custo invisível de viver em estéreo cultural.",
 E: "O vazio domingo à tarde, em hora que é noite no Brasil. A família já jantou lá. Você aqui, sozinho(a), com a diferença que nenhum aplicativo preenche.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. A primeira é o que o lugar novo pode te dar. A segunda é o que só você pode reconstruir por dentro.",
 renda_alta_vazio: "Se chegou grana fora, parece emprestado. Você sente que 'ainda tem que provar'. Essa prova é pra você, não pra ninguém. E ela não chega.",
 p_meta_ativo: "Uma voz disse 'gringo achando que entende a vida'. Essa voz é o código do deslocamento falando com o sotaque de quem você deixou pra trás.",
 p9_cronico: "Terapia em dois idiomas, grupos de expat, conversas com quem também foi. Cada uma aliviou. Nenhuma tocou o eixo identitário que o deslocamento rachou.",
 },

 A15: { // Mãe/Pai Solo
 prof_cura: "Se trabalha cuidando, a vida inteira é cuidado. Trabalho e casa têm o mesmo verbo. Sua única pausa seria um lugar onde ninguém dependesse de você. Esse lugar não existe.",
 luto_ancestral: "Sua linhagem tem mulheres (ou homens) que seguraram sozinhas. A perda recente ativou essa série. Você não tá inventando essa dor, tá continuando.",
 soma: {
 A: "O aperto no peito quando o filho precisa de algo extra. Não é do amor, é da conta mental. Você já fez o cálculo antes de sentir se dói.",
 B: "O peso nos ombros é físico. Você carrega compras, criança, agenda, dívida. Os ombros são literais, e a cronicidade deles virou postura.",
 C: "O nó no estômago quando pensa em pedir ajuda. Pedir contradiz a identidade de quem dá conta. O nó é o filtro antes da boca abrir.",
 D: "O cansaço que virou estrutura é conhecido. Você não lembra do corpo sem ele. A ideia de 'descansado' virou abstração teórica.",
 E: "O vazio com culpa por querer algo só pra você. 'Os filhos precisam de mim'. A culpa chega na hora exata em que um desejo próprio aparece.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. A primeira é o sonho realista. A segunda é a parceria, a rede, o colo que você não teve e nem admite querer.",
 renda_alta_vazio: "Se tem renda estável, tem um preço, ninguém divide o peso. Ter dinheiro e sustentar sozinha é menos ruim que não ter. Menos ruim não é bom.",
 p_meta_ativo: "Uma voz disse 'se eu parar, desmorona'. Essa voz é o código. Ela mantém você funcionando e te impede de olhar que funcionar desse jeito já é desmoronar em câmera lenta.",
 p9_cronico: "Tentou se organizar. Apps, planilhas, terapia, curso de gestão emocional. Cada um deu respiro curto. Porque o problema não é gestão, é a ausência de rede, que nenhum método substitui.",
 },

 A16: { // Casamento Invisível
 prof_cura: "Se cuida profissionalmente, você é vista(o) no trabalho. Em casa, não. Esse contraste virou rotina. Você aceita como se fosse natureza.",
 luto_ancestral: "Sua linhagem tem gente que casou e sumiu dentro. Você tá em conformidade com essa tradição. A perda recente piorou a invisibilidade, ninguém perguntou direito como você tá.",
 soma: {
 A: "O aperto no peito quando o parceiro chega e não olha no seu olho. Não é ofensa pontual, é sintoma de anos. O aperto soma.",
 B: "O peso nos ombros de manter a aparência. Nas fotos vocês estão bem. Na vida, a distância é clara. O peso é o custo de sustentar a narrativa.",
 C: "O nó no estômago ao tentar falar 'eu preciso de algo'. A frase não sai. O nó é o filtro que a sua identidade implantou: você é quem dá, não quem recebe.",
 D: "O cansaço de estar presente e não ser visto(a). Isso cansa de um jeito que sono não cura.",
 E: "O vazio no fim do dia, deitado(a) ao lado de alguém que você ama, sentindo distância no metro que separa os dois. A culpa chega junto: 'pareço ingrato(a)'.",
 },
 asp_divergente: "Se nada te impedisse, iria pra ${ASP}. Se a interferência sumisse, mudaria ${P35}. A diferença revela onde está o silêncio. O que você diz que quer não é onde o código travou. Travou em ser vista(o).",
 renda_alta_vazio: "Bens de casal crescendo, existência individual zerada. Você é parte do balanço, não é mais parceiro(a). Essa diferença dói sem conseguir ser nomeada.",
 p_meta_ativo: "Uma voz disse 'se eu falar, vira briga'. Essa voz é a trava. Ela manteve você em silêncio por anos. Continua trabalhando.",
 p9_cronico: "Terapia de casal que virou listagem de reclamações. Terapia individual que te ajudou a 'entender o outro'. Cada uma desviou do ponto: ninguém te ajudou a recuperar a sua voz dentro do casamento.",
 },

 A17: { // Criativo Bloqueado
 prof_cura: "Se você cuida profissionalmente, o dom criativo tá entrelaçado com o terapêutico. Uma parte sua cria pra curar. A outra parte nunca mostra o trabalho.",

function moduladorDemo(answers) {
 const idade = answers.Q_IDADE || "35-44";
 const jovem = ["<18","18-24","25-34"].includes(idade);
 const maduro = ["45-54","55-64","65+"].includes(idade);
 const registro_etario = jovem ? "jovem" : maduro ? "maduro" : "adulto";
 const renda = answers.Q_RENDA || "5k";
 const financeiro = ["20k","50k","100k","100k+"].includes(renda) ? "alto" : ["0","1k","2k"].includes(renda) ? "baixo" : "medio";
 const rel = answers.Q_RELIGIAO || "deista";
 const espiritual = ["evangelico","catolico"].includes(rel) ? "religioso" : ["espirita","deista","outra"].includes(rel) ? "espiritual" : "secular";
 const civil = answers.Q_CIVIL || "solteiro";
 const ocup = answers.Q_OCUPACAO || "clt";
 const gen = answers.GENERO || "O";
 const suf = gen === "F" ? "a" : gen === "M" ? "o" : "o(a)";
 const familia = answers.Q_FAMILIA || "sozinho";
 const FAIXA_MAP = {"<18":"menos de 18","18-24":"18 a 24","25-34":"25 a 34","35-44":"35 a 44","45-54":"45 a 54","55-64":"55 a 64","65+":"mais de 65"};
 const faixa_label = FAIXA_MAP[idade] || "35 a 44";
 const tempo_frase = maduro ? "Depois de décadas vivendo com isso" : jovem ? "Mesmo jovem, esse código já opera há anos" : "Há anos vivendo com isso";

 // Calibração epigenética por idade (para Nível 0)
 let epi_quem;
 if (["65+"].includes(idade)) epi_quem = "Você MESMO viveu a hiperinflação dos anos 80-90";
 else if (["55-64"].includes(idade)) epi_quem = "Você viveu a hiperinflação dos anos 80-90 quando era jovem";
 else if (["45-54"].includes(idade)) epi_quem = "Seus pais enfrentaram a hiperinflação dos anos 80-90 enquanto você era criança";
 else if (["35-44"].includes(idade)) epi_quem = "Seus pais viveram a hiperinflação dos anos 80-90";
 else if (["25-34"].includes(idade)) epi_quem = "Seus pais e avós viveram a hiperinflação dos anos 80-90";
 else epi_quem = "Seus avós viveram a hiperinflação dos anos 80-90";

 return { registro_etario, financeiro, espiritual, civil, ocup, suf, faixa_label, tempo_frase, epi_quem, familia, gen, idade };
}

// Calcula os 6 eixos a partir das respostas
// G8: usa MÉDIA por Nível (não soma) pra evitar inflação
// ═══════════════════════════════════════════════════════════════

function calcularEixos(a) {
 // E1, 5 Níveis de Interferência (média por nível)
 const nivel0 = 0; // Pré-natal: sem perguntas diretas; inferido por BIO1/BIO2 + idade
 const nivel1 = media([a.P25, a.P26, a.P27]); // Pré-verbal
 const nivel2 = media([a.P12, a.P14, a.P18]); // Verbal 0-7, v37 W2: P19 fundida em P12 (pergunta única captura tensão + frases de escassez)
 const nivel3 = media([a.P13, a.P15, a.P17]); // Vínculos Autoridade (religiosa principalmente)
 const nivel4 = media([a.P21, a.P22]); // Campo Coletivo (sistêmica), v36 W3: P20 removida

 // E1b, Evento biográfico como amplificador (G11-FIX: função contínua linear)
 const ev = a.P23_EVENTO || [];
 const concretos = ev.filter(v => ["falencia","divorcio","perda","diagnostico","violencia"].includes(v));
 let evento_boost = Math.min(1.2, concretos.length * 0.4);
 if (evento_boost === 0 && ev.includes("acumulo")) evento_boost = 0.3;

 // Amplificar o nível dominante com evento biográfico (v12: escala 0-4, cap em 4.5 pra boosts)
 let niveis = [nivel0, nivel1, nivel2, nivel3, nivel4];
 if (evento_boost > 0) {
 const maxIdx = niveis.indexOf(Math.max(...niveis));
 niveis[maxIdx] = Math.min(4.5, niveis[maxIdx] + evento_boost);
 }

 // BIO1/BIO2 boosts
 const b1 = a.BIO1, b2 = a.BIO2 || [];
 if (b1 === "B") niveis[1] += 0.3; // Pais divorciaram → boost pré-verbal
 if (b1 === "C") niveis[0] += 0.4; // Perdeu pai/mãe → boost pré-natal
 if (["D","E","F"].includes(b1)) niveis[1] += 0.5; // Criado por outros/pai ausente/instituição → boost pré-verbal
 if (b2.includes("A")) { niveis[1] += 0.3; } // Alguém foi embora
 if (b2.includes("B")) { niveis[2] += 0.3; } // Chão financeiro
 if (b2.includes("C")) { niveis[1] += 0.3; } // Dificuldade confiar
 if (b2.includes("D") || b2.includes("E")) { // Mundo inseguro / erosão → boost líder
 const maxIdx = niveis.indexOf(Math.max(...niveis));
 niveis[maxIdx] += 0.2;
 }

 // Boost religioso cruzado (Q_RELIGIAO × P13/P15/P17), v12: escala 0-4, threshold "concordo" (≥3)
 if (["evangelico","catolico"].includes(a.Q_RELIGIAO || "")) {
 if ((a.P17 || 0) >= 3) niveis[3] += 0.4;
 if ((a.P13 || 0) >= 3) niveis[3] += 0.3;
 if ((a.P15 || 0) >= 3) niveis[3] += 0.3;
 }

 // P_SOMA boosts
 if (a.P_SOMA === "E") niveis[3] += 0.2; // Culpa → boost religioso
 // G5 fix: P_SOMA=F boosta N0 (pré-natal) ALÉM de N1 (pré-verbal)
 if (a.P_SOMA === "F") { niveis[1] += 0.2; niveis[0] += 0.3; }

 // G5: P_ANCESTRAL alimenta N0, v12: threshold ≥2 (neutro+), peso 0.5 pra compensar range menor
 if ((a.P_ANCESTRAL || 0) >= 2) niveis[0] += (a.P_ANCESTRAL || 0) * 0.5;

 // Clamp, v12: max 4.5 (range 0-4 + boosts)
 niveis = niveis.map(n => Math.min(4.5, Math.max(0, n)));

 // E2, Padrão de defesa, v12: P28 ajustado (antes subtraía 2 em escala 0-5; agora subtrai 1 em escala 0-4)
 let esg_score = (a.P33 || 0) * 0.5 + Math.max(0, (a.P28 || 0) - 1) * 0.3;
 if (a.P_SOMA === "B") esg_score += 0.5; // Frustração = proxy de esgotamento
 if (b2.includes("E")) esg_score += 0.5;
 // v27 R3: piso, esgotado só vence se há sinal forte; caso contrário zera pra outros padrões concorrerem
 const esgotado_sinal_forte = (a.P33 || 0) >= 3 || (a.P28 || 0) >= 3 || a.P_SOMA === "B" || b2.includes("E");

 };

 // E4, Superfície, v34: P10 agora é multi-select (até 2). Normalizo; primária = [0], secundária = [1].

 const superficie_secundaria = P10_arr[1] || null;

 mascara,
 evento_boost,
 p8: a.P8 || "C",
 p9: a.P9 || [],
 p_soma: a.P_SOMA,
 };
}

function media(vals) {
 const nums = vals.filter(v => typeof v === "number" && !isNaN(v));
 if (nums.length === 0) return 0;
 return nums.reduce((s, v) => s + v, 0) / nums.length;
}

function classificarPerfil(eixos, answers) {

 const maxNivel = Math.max(...niveis);

 // Threshold leve, interferência insuficiente → A11 direto
 if (maxNivel < 1.6) {

 }

 const scores = calcularScoresPerfis(eixos, answers);

 // v30 V3: tie-break por prioridade, em empates, preferir gates > clusters > catch-all (A06/A11)
 // v30 V3 fix: gates absolutos → clusters de alta especificidade (incl. A23, A24, A26) → clusters → catch-all
 // v35 W1-FIX2 (Caminho A cont.): A04 promovido antes de A14 (Pré-Natal/Pré-Verbal é mais fundacional que Vício em Transformação).
 // A04 ganha tie-break em empates 3-way contra A14 e A25.
 const PRIORITY_ORDER = ["A13","A20","A21","A22","A27","A19","A23","A24","A04","A17","A15","A16","A09","A10","A18","A26","A05","A08","A12","A14","A07","A01","A25","A02","A03","A06","A11"];
 const sorted = Object.entries(scores).sort((a, b) => {
 if (b[1] !== a[1]) return b[1] - a[1];
 // Empate: usa PRIORITY_ORDER pra romper
 const ia = PRIORITY_ORDER.indexOf(a[0]);
 const ib = PRIORITY_ORDER.indexOf(b[0]);
 return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
 });

 // Proteção: se nenhum perfil pontuou, cai no fallback por nível dominante
 if (sorted[0][1] === 0) {
 const primario = FALLBACK_POR_NIVEL[niveis_sorted[0].nivel] || "A11";
 return { primario, secundario: null, confianca: "composta", margem: 0, intensidade: maxNivel, scores };
 }

 const primario = sorted[0][0];
 const secundarioCandidato = sorted[1] && sorted[1][1] > 0 ? sorted[1][0] : null;
 const margemScore = sorted[0][1] - (sorted[1] ? sorted[1][1] : 0);

 // Confiança baseada em margem de score (não mais em margem de níveis)
 let confianca;
 if (margemScore >= 5) confianca = "alta";
 else if (margemScore >= 2) confianca = "media";
 else confianca = "composta";

 // Secundário só se margem for pequena (composição real)
 const secundario = (confianca === "composta" && secundarioCandidato !== primario) ? secundarioCandidato : null;

 // margem em níveis ainda é útil pra narrativa ("duas camadas")
 const margem = niveis_sorted[0].score - niveis_sorted[1].score;

 return { primario, secundario, confianca, margem, intensidade: maxNivel, scores };
}

const TOTAL_Q = QUESTIONS.filter(q => q.type !== "transition").length;

function QuizDiagnostico() {
 const [step, setStep] = useState(-1);
 const [answers, setAnswers] = useState({});
 const [result, setResult] = useState(null);
 const [anim, setAnim] = useState(false);
 const ref = useRef(null);

 const cQ = step >= 0 ? QUESTIONS[step] : null;
 const qNum = step >= 0 ? QUESTIONS.slice(0, step + 1).filter(q => q.type !== "transition").length : 0;

 const goNext = () => {
 setAnim(true);
 setTimeout(() => {
 if (step + 1 >= QUESTIONS.length) {
 // Calcular resultado
 const eixos = calcularEixos(answers);
 const demo = moduladorDemo(answers);
 const classificacao = classificarPerfil(eixos, answers);
 const inferencias = gerarInferencias(classificacao.primario, eixos, demo, answers);
 setResult({ eixos, demo, classificacao, inferencias });
 } else {
 setStep(s => s + 1);
 }
 setAnim(false);
 if (ref.current) ref.current.scrollTo(0, 0);
 }, 300);
 };

 const setA = (id, v) => setAnswers(p => ({ ...p, [id]: v }));
 const canGo = () => {
 if (!cQ || cQ.type === "transition") return true;
 const v = answers[cQ.id];
 if (cQ.type === "text") return v && v.trim().length > 0;
 if (cQ.type === "multi") return v && v.length > 0;
 return v !== undefined && v !== null;
 };

 useEffect(() => {
 if (cQ && cQ.type === "transition") {
 const t = setTimeout(goNext, 3000);
 return () => clearTimeout(t);
 }
 }, [step]);

 if (result) return <DiagnosticoOutput answers={answers} result={result} />;

 return (
 <div ref={ref} style={{ minHeight: "100vh", background: `linear-gradient(170deg, ${C.bg1} 0%, ${C.bg2} 40%, ${C.bg3} 100%)`, color: C.text, fontFamily: "'Crimson Text','Georgia',serif", overflow: "auto" }}>
 <style>{`

 .scale-btn .dot{border-radius:50%;transition:all .25s}
 .scale-btn:hover .dot{transform:scale(1.15)}
 .scale-btn.selected .dot{transform:scale(1.25);box-shadow:0 0 24px currentColor}
 /* tamanhos escalonados: extremos maiores, neutro menor, comunica intensidade */

 .scale-btn.v-neg2.selected .dot{background:rgba(220,90,110,0.35)}
 .scale-btn.v-neg1.selected .dot{background:rgba(220,140,130,0.3)}
 .scale-btn.v-neutro.selected .dot{background:rgba(160,180,208,0.25)}
 .scale-btn.v-pos1.selected .dot{background:rgba(120,210,150,0.3)}
 .scale-btn.v-pos2.selected .dot{background:rgba(77,255,145,0.4)}

 .next-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(77,166,255,0.4)}
 .next-btn:disabled{opacity:.3;cursor:not-allowed}

 .text-input:focus{border-color:${C.blue}}
 .text-input::placeholder{color:rgba(160,180,208,0.4)}
 `}</style>

 {step === -1 ? (
 <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "40px 24px", textAlign: "center" }}>
 <div style={{ maxWidth: 560 }}>
 <AscensaoHeader />
 <div style={{ height: 40 }} />
 <h1 style={{ fontSize: "clamp(28px,5vw,42px)", fontWeight: 700, lineHeight: 1.2, marginBottom: 24, background: `linear-gradient(135deg,${C.text},${C.textMid})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Descubra as interferências instaladas em você<br />que te impedem de prosperar até hoje.</h1>
 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 16, color: C.textMid, lineHeight: 1.7, marginBottom: 40 }}>Este não é um teste genérico. É um diagnóstico personalizado construído a partir das suas respostas, que revela a origem, o padrão e o mecanismo do que te trava.</p>
 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 14, color: C.textDim, marginBottom: 12 }}>~5 minutos · 100% gratuito</p>
 <button style={{ display: "inline-block", padding: "18px 56px", border: "none", borderRadius: 40, background: `linear-gradient(135deg,${C.blue},${C.blueDark})`, color: "#fff", fontFamily: "'Outfit',sans-serif", fontSize: 18, fontWeight: 600, cursor: "pointer", transition: "all .3s" }} onClick={() => setStep(0)}

 ) : cQ ? (
 <div className={`q-fade ${anim ? "q-fade-out" : ""}`} key={step}>
 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 12, fontWeight: 500, color: C.blue, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{cQ.label}</p>
 <h2 style={{ fontSize: 22, fontWeight: 600, lineHeight: 1.4, marginBottom: cQ.subtitle ? 10 : 28, color: C.text }}>{cQ.title}</h2>
 {cQ.subtitle && <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 13, color: C.textDim, marginBottom: 24, fontStyle: "italic" }}>{cQ.subtitle}</p>}
 {cQ.type === "single" && cQ.options.map(o => (<button key={o.value} className={`opt-btn ${answers[cQ.id] === o.value ? "selected" : ""}`} onClick={() => { setA(cQ.id, o.value); setTimeout(goNext, 400); }}>{o.label}</button>))}
 {cQ.type === "multi" && (<>{cQ.options.map(o => { const p = answers[cQ.id] || []; const s = p.includes(o.value); const atMax = cQ.maxSelect && p.length >= cQ.maxSelect && !s; return (<button key={o.value} className={`opt-btn ${s ? "multi-selected" : ""}`} disabled={atMax} style={atMax ? { opacity: 0.35, cursor: "not-allowed" } : undefined} onClick={() => { if (atMax) return; if (o.value === "nada" || o.value === "F") setA(cQ.id, [o.value]); else setA(cQ.id, s ? p.filter(v => v !== o.value) : [...p.filter(v => v !== "nada" && v !== "F"), o.value]); }}><span style={{ marginRight: 8, opacity: .5 }}>{s ? "✓" : "○"}</span>{o.label}</button>); })}<button className="next-btn" disabled={!canGo()} onClick={goNext}>Continuar</button></>)}
 {cQ.type === "scale" && (() => {
 const SCALE_OPTIONS = [
 { v: 0, klass: "v-neg2", aria: "Discordo totalmente" },
 { v: 1, klass: "v-neg1", aria: "Discordo" },
 { v: 2, klass: "v-neutro", aria: "Neutro" },
 { v: 3, klass: "v-pos1", aria: "Concordo" },
 { v: 4, klass: "v-pos2", aria: "Concordo plenamente" },
 ];
 return (
 <>
 <div className="scale-row">
 {SCALE_OPTIONS.map(o => (
 <button key={o.v}
 className={`scale-btn ${o.klass} ${answers[cQ.id] === o.v ? "selected" : ""}`}
 title={o.aria}
 aria-label={o.aria}
 onClick={() => { setA(cQ.id, o.v); setTimeout(goNext, 400); }}>
 <span className="dot" />
 </button>
 ))}

 </>

 {cQ.type === "text" && (<><input className="text-input" type={cQ.id === "EMAIL" ? "email" : "text"} placeholder={cQ.id === "WHATSAPP" ? "(11) 99999-9999" : ""} value={answers[cQ.id] || ""} onChange={e => setA(cQ.id, e.target.value)} onKeyDown={e => { if (e.key === "Enter" && canGo()) goNext(); }} autoFocus /><button className="next-btn" disabled={!canGo()} onClick={goNext}>Continuar</button></>)}

// v38 W1: seleciona depoimentos por compatibilidade com demo (gen/ocup/idade)
// Reordena os 3 depoimentos do perfil priorizando o mais parecido com quem está lendo.
function selecionarDepoimentos(depoimentos, demo) {
 const ageMap = { "<18":16, "18-24":21, "25-34":30, "35-44":40, "45-54":50, "55-64":60, "65+":68 };
 const userAge = ageMap[demo.idade] || 40;
 const score = (d) => {
 let s = 0;
 const ctx = (d.contexto || "").toLowerCase();
 const autor = (d.autor || "").toLowerCase();
 // Ocupação
 if (demo.ocup === "empresario" && (ctx.includes("empres") || ctx.includes("ceo"))) s += 3;
 if (demo.ocup === "autonomo" && ctx.includes("autônom")) s += 3;
 if (demo.ocup === "clt" && (ctx.includes("clt") || ctx.includes("gerência") || ctx.includes("analista") || ctx.includes("funcion") || ctx.includes("enfermeira") || ctx.includes("professor"))) s += 3;
 if (demo.ocup === "aposentado" && ctx.includes("aposent")) s += 3;

 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 14, lineHeight: 1.7, color: C.textMid, margin: 0 }}>

 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 14, lineHeight: 1.7, color: C.textMid, margin: 0 }}>

 {/* Subtítulo: Onde ela se manifesta, recebe inferencias.s1 migradas + manif[2] + s2 de perfil */}
 {PB("Onde ela se manifesta")}

 {/* Frases que vieram do S1 (cruzamento dinâmico padrão × superfície/ocup + G4 + G1) */}
 {inferencias.s1.map((t, i) => P(t, { color: C.textMid, key: "s2_mani_s1_" + i }))}

 {/* Como aparece hoje (da MANIFESTACAO_PERFIL_CAMADA) */}
 {manifestacao && manifestacao[2] && P(manifestacao[2], { color: C.textMid, key: "s2_mani_hoje" })}

 {/* Inferências S2 de perfil (slice -2 prioriza as mais específicas) */}
 {inferencias.s2.slice(-2).map((t, i) => P(t, { color: C.textMid, key: "s2_extra_" + i }))}

 {/* v35 W1, Inferências cruzadas (inferirOculto): revelações sobre o que NÃO foi declarado */}
 {inferencias.ocultos && inferencias.ocultos.length > 0 && (

 {inferencias.ocultos.map((t, i) => P(t, { color: C.textMid, key: "s2_oculto_" + i, fontStyle: "italic" }))}
 </div>
 )}
 </>
 );
 })()}
 </>)}

 {/* ─── BLOCO A: MANIFESTAÇÕES PRIMEIRO (sem intro teórica) ─── */}
 {inferencias.s3.slice(0, 2).map((t, i) => SCI(t))}
 {SCI(perfil.sequestro_logica)}
 {inferencias.s3.slice(2).map((t, i) => P(t, { color: C.textMid, key: "s3b_" + i }))}

 <div style={{ background: "rgba(77,166,255,0.04)", border: `1px dashed ${C.blueBorder}`, borderRadius: 10, padding: "14px 18px", margin: "14px 0 4px" }}>

 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 14, lineHeight: 1.7, color: C.textMid, margin: 0 }}>Quando crenças pessoais são desafiadas, a Rede Neural Padrão (Raichle, PNAS 2001) ativa uma resposta defensiva mensurável. Quanto maior a autoridade percebida de quem instalou a crença, maior a resistência do cérebro a atualizá-la.</p>
 </div>
 </div>

 {/* Mecanismo Quântico */}
 <div style={{ marginTop: 24 }}>
 {PB("O mecanismo quântico")}
 {P("O campo também se reorganiza pra corresponder à frequência dominante da identidade. Não porque pune ou recompensa. Porque é lei. A mesma lei que rege o cérebro rege o cosmos.", { color: C.textMid })}
 {P("Não é o universo dizendo não. É o universo sendo justo, entregando o que a frequência dominante da identidade pede. Sempre. Sem exceção. Sem julgamento moral.", { color: C.textMid })}

 <div style={{ background: "rgba(77,166,255,0.04)", border: `1px dashed ${C.blueBorder}`, borderRadius: 10, padding: "14px 18px", margin: "14px 0 4px" }}>
 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 11, fontWeight: 600, color: C.blue, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Evidência científica · HeartMath Institute, pesquisa sobre coerência cardíaca</p>
 <p style={{ fontFamily: "'Outfit',sans-serif", fontSize: 14, lineHeight: 1.7, color: C.textMid, margin: 0 }}>O Instituto HeartMath demonstrou que o coração produz um campo eletromagnético até 5.000x mais potente que o do cérebro. Esse campo emite um sinal mensurável a até 7 metros em estado de coerência, e se reorganiza junto com o estado interno dominante.</p>
 </div>
 </div>
 </>)}
 <FeedbackBloco blocoId="S3" label="Esse mecanismo explica o que você vive?" />
 {DIV()}

 {/* ══════ S4, SUA IDENTIDADE DESSINTONIZADA, v31: título invertido + intro enxuta ══════ */}
 {SEC("Sua Identidade Dessintonizada", <>
 {P("Tudo isso CONSTRUIU uma identidade. É o \"EU SOU\" a partir do qual tudo opera.")}

 {/* v11-FIX: bloco "Onde esse perfil se encaixa no mecanismo" removido, revelava termos sem contexto */}

 {/* Inferências S4 */}
 {inferencias.s4.map((t, i) => P(t, { color: C.textMid, key: "s4_" + i }))}

 {P("Enquanto a identidade estiver sintonizada com a realidade que você VIVE, e não com a que QUER: a interferência vai continuar gerando regressão.", { fontWeight: 600, marginTop: 28 })}

 onMouseEnter={e => { e.target.style.transform = "translateY(-2px)"; e.target.style.boxShadow = "0 12px 32px rgba(77,166,255,0.4)"; }}

 </>)}

 );
